  <style>
    body {
      margin: 0;
      font-family: 'Prompt', sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }

    /* NAVBAR */
    .navbar {
      background: #ffffff;
      border-bottom: 4px solid #FFCE00;
      padding: 15px 40px;
      font-weight: 500;
    }

    .navbar h1 {
      margin: 0;
      font-size: 22px;
      color: #000;
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #FFCE00, #fff);
      padding: 60px 20px;
      text-align: center;
    }

    .hero h2 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #444;
    }

    /* MENU GRID */
    .menu-section {
      padding: 50px 20px;
      max-width: 1100px;
      margin: auto;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .menu-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      text-decoration: none;
      color: #000;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      transition: 0.3s;
      border: 2px solid transparent;
    }

    .menu-card:hover {
      transform: translateY(-5px);
      border: 2px solid #FFCE00;
    }

    .menu-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .menu-title {
      font-size: 18px;
      font-weight: 500;
    }

    /* FOOTER */
    .footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>

</head>

<body>
